version: '3.8'

services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env   # ✅ better path
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        - VITE_API_BASE_URL=/api   # ✅ FINAL FIX
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongodb_data:
